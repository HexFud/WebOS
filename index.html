<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WebOS – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-title">WebOS</div>
          <div class="brand-subtitle" data-i18n="topbarSubtitle">Sistema demo</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="system-button" class="system-button" type="button" data-i18n="systemMenuButton">Sistema</button>
        <div id="system-menu" class="system-menu" aria-hidden="true">
          <label for="language-select" data-i18n="languageLabel">Lingua del sistema</label>
          <select id="language-select" aria-label="Lingua del sistema">
            <option value="it">Italiano</option>
            <option value="en">English</option>
            <option value="es">Español</option>
          </select>
        </div>
      </div>
    </header>

    <main id="desktop" aria-label="Desktop">
      <div class="icon" data-app="notes" data-label-key="notes" data-title-key="notes" title="Notes">
        <img src="assets/icons/notes.svg" alt="Notes">
        <div class="label">Notes</div>
      </div>
      <div class="icon" data-app="calc" data-label-key="calculator" data-title-key="calculator" title="Calcolatrice">
        <img src="assets/icons/calc.svg" alt="Calcolatrice">
        <div class="label">Calculator</div>
      </div>
      <div class="icon" data-app="files" data-label-key="files" data-title-key="files" title="File">
        <img src="assets/icons/folder.svg" alt="File">
        <div class="label">File</div>
      </div>
    </main>

    <div id="dock" aria-label="Dock">
      <div class="dock-item" data-app="notes" data-label-key="notes">Notes</div>
      <div class="dock-item" data-app="calc" data-label-key="calculator">Calc</div>
    </div>
  </div>

  <template id="window-template">
    <div class="window">
      <div class="titlebar">
        <div class="title">App</div>
        <div class="controls">
          <button class="min">—</button>
          <button class="close">✕</button>
        </div>
      </div>
      <div class="content"></div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
