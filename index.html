<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WebOS – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="desktop">
    <div class="icon" data-app="notes" title="Notes">
      <img src="assets/icons/notes.svg" alt="Notes">
      <div class="label">Notes</div>
    </div>
    <div class="icon" data-app="calc" title="Calcolatrice">
      <img src="assets/icons/calc.svg" alt="Calcolatrice">
      <div class="label">Calcolatrice</div>
    </div>
    <div class="icon" data-app="files" title="File">
      <img src="assets/icons/folder.svg" alt="File">
      <div class="label">File</div>
    </div>
  </div>

  <div id="dock">
    <div class="dock-item" data-app="notes">Notes</div>
    <div class="dock-item" data-app="calc">Calc</div>
  </div>

  <template id="window-template">
    <div class="window">
      <div class="titlebar">
        <div class="title">App</div>
        <div class="controls">
          <button class="min">—</button>
          <button class="close">✕</button>
        </div>
      </div>
      <div class="content"></div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
